<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BibliFlow | Livros</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        var theme = localStorage.getItem("bibli-flow-theme") === "dark" ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", theme);
        document.documentElement.style.backgroundColor = theme === "dark" ? "#101010" : "#f3f3f3";
      })();
    </script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="brand-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 5.5C4 4.67 4.67 4 5.5 4H11V20H5.5A1.5 1.5 0 0 1 4 18.5V5.5Z" stroke="currentColor" stroke-width="1.8"/>
            <path d="M20 5.5C20 4.67 19.33 4 18.5 4H13V20H18.5A1.5 1.5 0 0 0 20 18.5V5.5Z" stroke="currentColor" stroke-width="1.8"/>
            <path d="M11 6.5C9.9 5.7 8.5 5.25 7 5.25C6 5.25 5 5.45 4.2 5.9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M13 6.5C14.1 5.7 15.5 5.25 17 5.25C18 5.25 19 5.45 19.8 5.9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </span>
        <h1>BibliFlow</h1>
      </div>
      <div class="header-actions">
        <button type="button" id="themeToggle" class="theme-toggle" aria-label="Ativar modo escuro">
          <span class="theme-icon" aria-hidden="true"></span>
        </button>
        <div class="stats">
          <div class="stat-card">
            <span>Livros</span>
            <strong id="booksCount">0</strong>
          </div>
          <div class="stat-card">
            <span>Clientes</span>
            <strong id="clientsCount">0</strong>
          </div>
          <div class="stat-card danger" id="overdueCard">
            <span>Atrasados</span>
            <strong id="overdueCount">0</strong>
          </div>
        </div>
      </div>
    </header>

    <nav class="page-nav">
      <a class="nav-link" href="index.html">Empréstimos</a>
      <a class="nav-link active" href="livros.html">Livros</a>
      <a class="nav-link" href="clientes.html">Clientes</a>
    </nav>

    <main class="single-layout">
      <section class="panel panel-wide">
        <h2>Livros</h2>
        <form id="bookForm" class="form-grid">
          <input type="text" id="bookId" placeholder="ID do livro" inputmode="numeric" required />
          <input type="text" id="bookTitle" placeholder="Título" required />
          <input type="text" id="bookAuthor" placeholder="Autor" required />
          <input type="text" id="bookLocation" placeholder="Local" required />
          <input type="text" id="bookGenre" placeholder="Gênero" required />
          <input type="text" id="bookPublisher" placeholder="Editora" required />
          <button type="submit">Salvar Livro</button>
        </form>

        <div class="table-tools">
          <input type="search" id="booksSearch" placeholder="Buscar livro por qualquer informação" />
        </div>

        <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Título</th>
              <th>Autor</th>
              <th>Local</th>
              <th>Gênero</th>
              <th>Editora</th>
              <th>Status</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="booksTable"></tbody>
        </table>
        </div>
      </section>
    </main>


    <div id="bookEditModal" class="modal" aria-hidden="true">
      <div class="modal-card">
        <h3>Editar Livro</h3>
        <form id="bookEditForm" class="form-grid modal-grid">
          <input type="text" id="bookEditId" placeholder="ID do livro" inputmode="numeric" required />
          <input type="text" id="bookEditTitle" placeholder="Título" required />
          <input type="text" id="bookEditAuthor" placeholder="Autor" required />
          <input type="text" id="bookEditLocation" placeholder="Local" required />
          <input type="text" id="bookEditGenre" placeholder="Gênero" required />
          <input type="text" id="bookEditPublisher" placeholder="Editora" required />
          <div class="modal-actions">
            <button type="button" class="action-btn" id="bookEditCancel">Cancelar</button>
            <button type="submit">Salvar alteração</button>
          </div>
        </form>
      </div>
    </div>

    <div id="toast" class="toast" aria-live="polite"></div>

    <script src="script.js"></script>
  </body>
</html>
