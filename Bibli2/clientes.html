<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BibliFlow | Clientes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>📚 BibliFlow</h1>
      </div>
      <div class="stats">
        <div class="stat-card">
          <span>Livros</span>
          <strong id="booksCount">0</strong>
        </div>
        <div class="stat-card">
          <span>Clientes</span>
          <strong id="clientsCount">0</strong>
        </div>
        <div class="stat-card danger" id="overdueCard">
          <span>Atrasados</span>
          <strong id="overdueCount">0</strong>
        </div>
      </div>
    </header>

    <nav class="page-nav">
      <a class="nav-link" href="index.html">Livros e Aluguéis</a>
      <a class="nav-link active" href="clientes.html">Clientes</a>
    </nav>

    <main class="single-layout">
      <section class="panel panel-wide">
        <h2>Clientes</h2>
        <form id="clientForm" class="client-form-grid">
          <input type="text" id="clientId" placeholder="ID do cliente" required />
          <input type="text" id="clientName" placeholder="Nome" required />
          <input
            type="text"
            id="clientCpf"
            placeholder="CPF (11 dígitos)"
            inputmode="numeric"
            minlength="11"
            maxlength="11"
            required
          />
          <input
            type="text"
            id="clientPhone"
            placeholder="Telefone (10 ou 11 dígitos)"
            inputmode="numeric"
            minlength="10"
            maxlength="11"
            required
          />
          <button type="submit">Salvar Cliente</button>
        </form>

        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Nome</th>
              <th>CPF</th>
              <th>Telefone</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="clientsTable"></tbody>
        </table>
      </section>
    </main>

    <div id="toast" class="toast" aria-live="polite"></div>

    <script src="script.js"></script>
  </body>
</html>
