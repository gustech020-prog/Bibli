<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BibliFlow | Empréstimos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        var theme = localStorage.getItem("bibli-flow-theme") === "dark" ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", theme);
        document.documentElement.style.backgroundColor = theme === "dark" ? "#101010" : "#f3f3f3";
      })();
    </script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="brand-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 5.5C4 4.67 4.67 4 5.5 4H11V20H5.5A1.5 1.5 0 0 1 4 18.5V5.5Z" stroke="currentColor" stroke-width="1.8"/>
            <path d="M20 5.5C20 4.67 19.33 4 18.5 4H13V20H18.5A1.5 1.5 0 0 0 20 18.5V5.5Z" stroke="currentColor" stroke-width="1.8"/>
            <path d="M11 6.5C9.9 5.7 8.5 5.25 7 5.25C6 5.25 5 5.45 4.2 5.9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M13 6.5C14.1 5.7 15.5 5.25 17 5.25C18 5.25 19 5.45 19.8 5.9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </span>
        <h1>BibliFlow</h1>
      </div>
      <div class="header-actions">
        <button type="button" id="themeToggle" class="theme-toggle" aria-label="Ativar modo escuro">
          <span class="theme-icon" aria-hidden="true"></span>
        </button>
        <div class="stats">
          <div class="stat-card">
            <span>Livros</span>
            <strong id="booksCount">0</strong>
          </div>
          <div class="stat-card">
            <span>Clientes</span>
            <strong id="clientsCount">0</strong>
          </div>
          <div class="stat-card danger" id="overdueCard">
            <span>Atrasados</span>
            <strong id="overdueCount">0</strong>
          </div>
        </div>
      </div>
    </header>

    <nav class="page-nav">
      <a class="nav-link active" href="index.html">Empréstimos</a>
      <a class="nav-link" href="livros.html">Livros</a>
      <a class="nav-link" href="clientes.html">Clientes</a>
    </nav>

    <main class="single-layout">
      <section class="panel panel-wide">
        <div class="panel-title-row">
          <h2>Gerenciar Empréstimos</h2>
        </div>
        <form id="rentalForm" class="form-grid rental-grid">
          <select id="rentalBook" required>
            <option value="">Selecione um livro</option>
          </select>
          <select id="rentalClient" required>
            <option value="">Selecione um cliente</option>
          </select>
          <input type="date" id="rentalStart" required />
          <button type="submit">Registrar Empréstimo (10 dias)</button>
        </form>

        <div class="table-wrap">
        <table class="rentals-table">
          <thead>
            <tr>
              <th>Livro</th>
              <th>Cliente</th>
              <th>Início</th>
              <th>Vencimento</th>
              <th>Devolução</th>
              <th>Status</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="activeRentalsTable"></tbody>
        </table>
        </div>
      </section>

      <details class="panel panel-wide" open>
        <summary>
          <div class="panel-title-row">
            <h2>Histórico de Empréstimos</h2>
            <div class="history-tools">
              <label class="search-with-icon compact-search" aria-label="Buscar no histórico de empréstimos">
                <span class="search-icon" aria-hidden="true">🔍</span>
                <input type="search" id="rentalsSearch" class="panel-search" placeholder="Buscar no histórico" />
              </label>
              <button type="button" id="deleteHistoryBtn" class="action-btn warn compact">🗑 Apagar selecionados</button>
            </div>
          </div>
        </summary>
        <div class="table-wrap">
        <table class="history-table">
          <thead>
            <tr>
              <th></th>
              <th>Livro</th>
              <th>Cliente</th>
              <th>Início</th>
              <th>Vencimento</th>
              <th>Devolução</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="rentalsHistoryTable"></tbody>
        </table>
        </div>
      </details>
    </main>

    <div id="toast" class="toast" aria-live="polite"></div>

    <script src="script.js"></script>
  </body>
</html>
