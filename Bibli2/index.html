<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BibliFlow | Gestão de Biblioteca</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>📚 BibliFlow</h1>
      </div>
      <div class="stats">
        <div class="stat-card">
          <span>Livros</span>
          <strong id="booksCount">0</strong>
        </div>
        <div class="stat-card">
          <span>Clientes</span>
          <strong id="clientsCount">0</strong>
        </div>
        <div class="stat-card danger" id="overdueCard">
          <span>Atrasados</span>
          <strong id="overdueCount">0</strong>
        </div>
      </div>
    </header>

    <nav class="page-nav">
      <a class="nav-link active" href="index.html">Livros e Aluguéis</a>
      <a class="nav-link" href="clientes.html">Clientes</a>
    </nav>

    <main class="grid-layout">
      <details class="panel panel-wide" open>
        <summary><h2>Livros</h2></summary>
        <form id="bookForm" class="form-grid">
          <input type="text" id="bookId" placeholder="ID do livro" inputmode="numeric" required />
          <input type="text" id="bookTitle" placeholder="Título" required />
          <input type="text" id="bookAuthor" placeholder="Autor" required />
          <button type="submit">Salvar Livro</button>
        </form>

        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Título</th>
              <th>Autor</th>
              <th>Status</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="booksTable"></tbody>
        </table>
      </details>

      <section class="panel panel-wide">
        <h2>Gerenciar Aluguéis</h2>
        <form id="rentalForm" class="form-grid rental-grid">
          <select id="rentalBook" required>
            <option value="">Selecione um livro</option>
          </select>
          <select id="rentalClient" required>
            <option value="">Selecione um cliente</option>
          </select>
          <input type="date" id="rentalStart" required />
          <button type="submit">Registrar Aluguel (10 dias)</button>
        </form>

        <table>
          <thead>
            <tr>
              <th>Livro</th>
              <th>Cliente</th>
              <th>Início</th>
              <th>Vencimento</th>
              <th>Devolução</th>
              <th>Status</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="activeRentalsTable"></tbody>
        </table>
      </section>

      <details class="panel panel-wide" open>
        <summary><h2>Histórico de Aluguéis</h2></summary>
        <table>
          <thead>
            <tr>
              <th>Livro</th>
              <th>Cliente</th>
              <th>Início</th>
              <th>Vencimento</th>
              <th>Devolução</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="rentalsHistoryTable"></tbody>
        </table>
      </details>
    </main>

    <div id="toast" class="toast" aria-live="polite"></div>

    <script src="script.js"></script>
  </body>
</html>
